<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Profile | Bootstrap</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <script defer src="js/profile-data.js"></script>
    <script defer src="js/app.js"></script>
  </head>
  <body>
    <header class="container profile-header">
      <nav class="profile-navbar card-elevated">
        <div class="profile-navbar-start">
          <img
            class="avatar-navbar"
            src="assets/eu.jpg"
            alt="Foto de Gabriel Coelho"
          />
          <a class="profile-navbar-brand" href="index.html"
            >Gabriel Coelho Costa</a
          >
        </div>
        <div class="profile-navbar-links">
          <a class="profile-nav-link" href="index.html">Inicio</a>
          <a class="profile-nav-link active" href="bootstrap.html">Bootstrap</a>
          <a class="profile-nav-link" href="tailwind.html">Tailwind</a>
        </div>
        <button
          class="theme-toggle"
          type="button"
          data-theme-toggle
          aria-label="Ativar tema escuro"
          title="Ativar tema escuro"
        >
          <img
            class="theme-toggle-icon"
            data-theme-icon
            src="assets/dark-mode.svg"
            alt=""
          />
          <span class="sr-only-custom" data-theme-toggle-label
            >Ativar tema escuro</span
          >
        </button>
      </nav>
    </header>

    <main class="container py-4 py-lg-5">
      <section
        class="card card-elevated rounded-4 p-4 p-lg-5 profile-section-card"
      >
        <span class="section-label section-label-floating"
          >Versão Bootstrap</span
        >
        <div class="row g-4 align-items-center">
          <div class="col-12 col-lg-7">
            <img
              class="avatar-profile"
              src="assets/eu.jpg"
              alt="Foto de Gabriel Coelho"
            />
            <h1 class="profile-name mt-2" data-profile-name></h1>
            <p class="profile-role mt-3" data-profile-title></p>
            <p class="profile-body" data-profile-description></p>
            <p class="profile-body" data-profile-about></p>
            <ul
              class="profile-tags d-flex flex-wrap gap-2 mt-4 p-0"
              data-profile-tags
            ></ul>
          </div>
          <div class="col-12 col-lg-5">
            <div class="card border-0 bg-transparent">
              <div class="card-body p-0">
                <h2 class="profile-section-title">Habilidades</h2>
                <ul
                  class="list-unstyled p-0 mb-4 profile-skills-scroll"
                  data-profile-skills
                ></ul>

                <h2 class="profile-section-title">Experiência</h2>
                <ul class="list-unstyled p-0" data-profile-experience></ul>
              </div>
            </div>
          </div>
        </div>

        <hr class="my-4" />

        <section>
          <h2 class="profile-section-title">Contato</h2>
          <div class="d-flex flex-column gap-2" data-profile-contacts></div>
        </section>
      </section>
    </main>
  </body>
</html>
