<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Profile | Gabriel Coelho Costa</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <script defer src="js/profile-data.js"></script>
    <script defer src="js/app.js"></script>
  </head>
  <body>
    <header class="container profile-header">
      <nav class="profile-navbar card-elevated">
        <div class="profile-navbar-start">
          <img
            class="avatar-navbar"
            src="assets/eu.jpg"
            alt="Foto de Gabriel Coelho"
          />
          <a class="profile-navbar-brand" href="index.html"
            >Gabriel Coelho Costa</a
          >
        </div>
        <div class="profile-navbar-links">
          <a class="profile-nav-link active" href="index.html">Inicio</a>
          <a class="profile-nav-link" href="bootstrap.html">Bootstrap</a>
          <a class="profile-nav-link" href="tailwind.html">Tailwind</a>
        </div>
        <button
          class="theme-toggle"
          type="button"
          data-theme-toggle
          aria-label="Ativar tema escuro"
          title="Ativar tema escuro"
        >
          <img
            class="theme-toggle-icon"
            data-theme-icon
            src="assets/dark-mode.svg"
            alt=""
          />
          <span class="sr-only-custom" data-theme-toggle-label
            >Ativar tema escuro</span
          >
        </button>
      </nav>
    </header>

    <main class="container py-5">
      <section class="row justify-content-center align-items-center g-4">
        <div class="col-12 col-lg-7">
          <span class="section-label">Página pessoal</span>
          <h1 class="profile-main-title mt-2">
            Compare Bootstrap e Tailwind CSS em uma mesma proposta
          </h1>
          <p class="profile-body mt-3">
            Este projeto organiza o conteúdo em duas versões visuais com a mesma
            base de informações.
          </p>
          <div class="d-flex flex-wrap gap-3 mt-4">
            <a class="btn btn-primary btn-primary-custom" href="bootstrap.html"
              >Abrir versão Bootstrap</a
            >
            <a class="btn btn-outline-secondary" href="tailwind.html"
              >Abrir versão Tailwind</a
            >
          </div>
        </div>
        <div class="col-12 col-lg-5">
          <article class="card card-elevated p-4 rounded-4">
            <img
              class="avatar-profile"
              src="assets/eu.jpg"
              alt="Foto de Gabriel Coelho"
            />
            <p class="section-label mb-2">Conteúdo base</p>
            <h2 class="profile-name mb-2" data-profile-name></h2>
            <p class="profile-role mb-3" data-profile-title></p>
            <p class="profile-body" data-profile-description></p>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
